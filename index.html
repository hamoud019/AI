<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد محمود — شات بوت الحسانية</title>
    <meta name="description" content="تحدث مع محمد محمود، راعي إبل موريتاني يتكلم الحسانية">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sand particles background -->
    <div class="sand-particles" id="sandParticles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-bg"></div>
            <div class="header-content">
                <div class="avatar-container">
                    <div class="avatar">
                        <span class="avatar-icon">🐪</span>
                        <span class="online-dot"></span>
                    </div>
                </div>
                <div class="header-info">
                    <h1>محمد محمود</h1>
                    <p class="subtitle">راعي إبل — البادية الموريتانية</p>
                </div>
                <div class="header-decorations">
                    <span class="deco-icon">🏜️</span>
                </div>
            </div>
        </header>

        <!-- Quick topic buttons -->
        <div class="topics-bar">
            <button class="topic-btn" data-topic="salutation">👋 تحية</button>
            <button class="topic-btn" data-topic="betail">🐫 الحيوان</button>
            <button class="topic-btn" data-topic="eau">💧 الماء</button>
            <button class="topic-btn" data-topic="meteo">🌤️ الطقس</button>
            <button class="topic-btn" data-topic="nourriture">🍞 الأكل</button>
            <button class="topic-btn" data-topic="famille">👨‍👩‍👧‍👦 العيلة</button>
            <button class="topic-btn" data-topic="religion">🕌 الدين</button>
            <button class="topic-btn" data-topic="identite">🪪 عن نفسه</button>
            <button class="topic-btn" data-topic="sagesse">📖 حكمة</button>
            <button class="topic-btn" data-topic="confusion">🤷 أمور المدينة</button>
        </div>

        <!-- Chat messages area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <div class="welcome-icon">🏕️</div>
                <h2>أهلاً وسهلاً في خيمة محمد محمود</h2>
                <p>أنا محمد محمود سيدي المختار، من أهل البادية. اسألني عن الإبل والصحراء والحياة في البادية الموريتانية.</p>
                <p class="welcome-hint">اكتب رسالة أو اختر موضوع من الأزرار ☝️</p>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-container">
                <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" title="إرسال">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
